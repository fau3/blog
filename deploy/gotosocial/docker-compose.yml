services:
  gotosocial:
    image: ${GOTOSOCIAL_IMAGE}
    container_name: gotosocial
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      GTS_ACCOUNT_DOMAIN: ${GTS_ACCOUNT_DOMAIN}
      GTS_ACCOUNTS_REGISTRATION_OPEN: ${GTS_ACCOUNTS_REGISTRATION_OPEN}
      GTS_BIND_ADDRESS: ${GTS_BIND_ADDRESS}
      GTS_DB_SQLITE_ADDRESS: ${GTS_DB_SQLITE_ADDRESS}
      GTS_DB_TYPE: ${GTS_DB_TYPE}
      GTS_HOST: ${GTS_HOST}
      GTS_LETSENCRYPT_ENABLED: ${GTS_LETSENCRYPT_ENABLED}
      GTS_LOG_LEVEL: ${GTS_LOG_LEVEL}
      GTS_PORT: ${GTS_PORT}
      GTS_PROTOCOL: ${GTS_PROTOCOL}
      GTS_STORAGE_BACKEND: ${GTS_STORAGE_BACKEND}
      GTS_STORAGE_LOCAL_BASE_PATH: ${GTS_STORAGE_LOCAL_BASE_PATH}
      GTS_TRUSTED_PROXIES: ${GTS_TRUSTED_PROXIES}
    ports:
      - 127.0.0.1:${HOST_BIND_PORT}:${GTS_PORT}
    volumes:
      - ./data:/gotosocial/storage
    healthcheck:
      test:
        - CMD-SHELL
        - wget --no-verbose --tries=1 --spider http://127.0.0.1:${GTS_PORT}/readyz || exit 1
      interval: 120s
      timeout: 5s
      retries: 3
      start_period: 20s
